<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>دستیار هوشمند معلم</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Tahoma, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f6f8;
            overflow: hidden;
        }

        /* ==========================================
           بخش منوی کناری (Sidebar)
           ========================================== */
        .sidebar {
            width: 260px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.15);
            z-index: 10;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            background-color: #1a252f;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 3px solid #e67e22; /* نوار نارنجی برای ظاهر پرانرژی‌تر */
        }

        .sidebar-header span {
            display: block;
            font-size: 12px;
            color: #bdc3c7;
            margin-top: 5px;
            font-weight: normal;
        }

        .menu-items {
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-items button {
            background-color: transparent;
            color: #ecf0f1;
            border: 1px solid transparent;
            padding: 12px 15px;
            text-align: right;
            font-family: Tahoma;
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-items button:hover {
            background-color: #34495e;
            border-color: #7f8c8d;
        }

        .menu-items button.active {
            background-color: #3498db;
            color: white;
            font-weight: bold;
            border-color: #2980b9;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* ==========================================
           بخش نمایش فایل‌ها (Main Content)
           ========================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #ecf0f1;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        /* پیام پیش‌فرض قبل از انتخاب پنل */
        .welcome-message {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #7f8c8d;
            background-color: #ecf0f1;
            z-index: 5;
        }
        
        .welcome-message span {
            font-size: 50px;
            margin-bottom: 15px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            مدیریت کلاس درس
            <span>پنل ابزارهای آموزشی</span>
        </div>
        <div class="menu-items">
            <button onclick="loadPage('./exam.html', this)">📝 پنل طراحی امتحان</button>
            <button onclick="loadPage('./worksheet.html', this)">📚 طراحی کاربرگ (تکلیف خانه)</button>
        </div>
    </div>

    <div class="main-content">
        <div id="welcome-text" class="welcome-message">
            <span>🏫</span>
            لطفاً یکی از ابزارهای طراحی را از منوی سمت راست انتخاب کنید.
        </div>

        <iframe id="content-frame" src="about:blank"></iframe>
    </div>

    <script>
        function loadPage(url, btnElement) {
            // مخفی کردن پیام راهنما
            document.getElementById('welcome-text').style.display = 'none';
            
            // لود کردن فایل در iframe
            document.getElementById('content-frame').src = url;

            // مدیریت رنگ دکمه‌ها
            let buttons = document.querySelectorAll('.menu-items button');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }
    </script>
</body>
</html>
